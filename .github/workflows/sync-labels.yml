---
# Source : chrysa/shared-standards/templates/workflows-process/
# Sync .github/labels.yml → GitHub labels sur push main/develop ou manuel
name: Sync GitHub Labels

run-name: 🏷️ Sync labels from config

on:
    push:
        branches:
            - develop
            - main
            - master
        paths:
            - .github/labels.yml
    workflow_dispatch:
    schedule:
        - cron: '0 2 * * 1'

permissions:
    contents: read
    issues: write

jobs:
    sync-labels:
        name: Synchronize labels
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Sync labels
              uses: marocchino/create-labels@v1.3.0
              with:
                  labels: .github/labels.yml
