---
name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        name: Lint & validate

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Run pre-commit hooks
              uses: pre-commit/action@v3.0.1
