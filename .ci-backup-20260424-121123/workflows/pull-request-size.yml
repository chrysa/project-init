---
name: Label Pull Request Size

on:
    pull_request:
        types: [opened, reopened, synchronize]

permissions:
    contents: read
    pull-requests: write

jobs:
    size-label:
        runs-on: ubuntu-latest
        name: Label PR by size
        steps:
            - name: Label pull request by size
              uses: codelytv/pr-size-labeler@v1
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  xs_max_size: 20
                  s_max_size: 50
                  m_max_size: 200
                  l_max_size: 800
                  fail_if_xl: false
