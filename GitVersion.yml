mode: ContinuousDeployment
increment: Inherit
major-version-bump-message: "^(feat|fix|refactor)(\(.+\))?!:.+"
minor-version-bump-message: "^feat(\(.+\))?:.+"
patch-version-bump-message: "^(fix|refactor|perf|docs|chore)(\(.+\))?:.+"
branches:
  main:
    regex: "^main$"
    mode: ContinuousDelivery
    tag: ""
    increment: Patch
  feature:
    regex: "^feat/"
    mode: ContinuousDeployment
    tag: "alpha"
    increment: Minor
  fix:
    regex: "^fix/"
    mode: ContinuousDeployment
    tag: "beta"
    increment: Patch
  chore:
    regex: "^chore/"
    mode: ContinuousDeployment
    tag: "alpha"
    increment: Patch
